<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Prezzi Carte">
<meta name="theme-color" content="#10152a">
<title>Cardmarket Ledger</title>
<style>
  :root {
    --bg: #10152a;
    --surface: #1b2340;
    --surface-2: #232b4d;
    --gold: #caa15c;
    --text: #eae6d8;
    --muted: #7d8296;
    --good: #5fae9d;
    --warn: #c9705c;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Iowan Old Style", Georgia, serif;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  header {
    padding: max(28px, env(safe-area-inset-top)) 20px 18px;
    border-bottom: 1px solid rgba(202, 161, 92, 0.25);
  }

  h1 {
    font-size: 22px;
    margin: 0 0 4px;
    letter-spacing: 0.02em;
    font-weight: 600;
  }

  .sottotitolo {
    font-family: ui-monospace, "SF Mono", "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  #totale {
    display: none;
    margin-top: 14px;
    padding: 14px 16px;
    background: var(--surface-2);
    border-radius: 8px;
    border-left: 3px solid var(--gold);
  }

  #totale .etichetta {
    font-family: ui-monospace, "SF Mono", "IBM Plex Mono", monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  #totale .valore {
    font-size: 26px;
    font-weight: 700;
    margin-top: 2px;
  }

  #totale .delta {
    font-family: ui-monospace, "SF Mono", "IBM Plex Mono", monospace;
    font-size: 12px;
    margin-top: 2px;
  }

  .delta.su { color: var(--good); }
  .delta.giu { color: var(--warn); }
  .delta.pari { color: var(--muted); }

  #lista { padding: 10px 14px 0; }

  .riga {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border-left: 3px solid var(--gold);
    border-radius: 6px;
    padding: 10px 14px 10px 10px;
    margin-bottom: 10px;
    cursor: pointer;
  }

  .riga.stato-vuoto { border-left-color: var(--muted); }
  .riga.stato-bloccato { border-left-color: var(--warn); }

  .miniatura {
    width: 44px;
    height: 62px;
    border-radius: 4px;
    object-fit: cover;
    background: var(--surface-2);
    flex-shrink: 0;
  }

  .miniatura.vuota {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 18px;
  }

  .info { flex: 1; min-width: 0; }

  .nome {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .badge {
    font-family: ui-monospace, "SF Mono", "IBM Plex Mono", monospace;
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.05em;
  }

  .dettagli {
    font-family: ui-monospace, "SF Mono", "IBM Plex Mono", monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .prezzo-chip {
    font-family: ui-monospace, "SF Mono", "IBM Plex Mono", monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--bg);
    background: var(--gold);
    border-radius: 999px;
    padding: 8px 14px;
    white-space: nowrap;
  }

  .prezzo-chip.vuoto {
    background: transparent;
    border: 1px solid var(--muted);
    color: var(--muted);
    font-weight: 400;
  }

  .prezzo-chip.bloccato {
    background: transparent;
    border: 1px solid var(--warn);
    color: var(--warn);
    font-size: 11px;
  }

  .grafico-box {
    display: none;
    background: var(--surface);
    border-radius: 0 0 6px 6px;
    margin: -10px 0 10px;
    padding: 6px 14px 12px;
  }

  .grafico-box.aperto { display: block; }

  .grafico-box svg { width: 100%; height: 90px; display: block; }

  .grafico-legenda {
    font-family: ui-monospace, "SF Mono", "IBM Plex Mono", monospace;
    font-size: 10px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
  }

  #vuoto, #errore {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    display: none;
  }
</style>
</head>
<body>
  <header>
    <h1>Cardmarket Ledger</h1>
    <div class="sottotitolo" id="aggiornato">caricamento...</div>
    <div id="totale">
      <div class="etichetta">Valore collezione (minimi IT)</div>
      <div class="valore" id="totaleValore"></div>
      <div class="delta" id="totaleDelta"></div>
    </div>
  </header>

  <div id="lista"></div>
  <div id="vuoto">Nessuna carta ancora in lista.<br>Aggiungila dall'estensione sul PC.</div>
  <div id="errore">Impossibile caricare data.json.<br>Fai almeno una sincronizzazione dall'estensione.</div>

<script>
fetch('data.json?t=' + Date.now())
  .then(function (r) { if (!r.ok) throw new Error('http ' + r.status); return r.json(); })
  .then(render)
  .catch(function () {
    document.getElementById('aggiornato').textContent = 'nessun dato';
    document.getElementById('errore').style.display = 'block';
  });

function formattaData(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  return d.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit' }) + ' ' +
         d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
}

function euro(v) { return v.toFixed(2).replace('.', ',') + ' €'; }

function serieCarta(storico, carta) {
  return storico
    .filter(function (r) { return r.link === carta.link; })
    .sort(function (a, b) { return a.data - b.data; });
}

function calcolaTotale(carte, storico) {
  var attuale = 0, precedente = 0, haPrecedente = false, conteggiate = 0;
  carte.forEach(function (c) {
    if (c.ultimoPrezzo == null) return;
    var q = c.quantita || 1;
    attuale += c.ultimoPrezzo * q;
    conteggiate++;
    var serie = serieCarta(storico, c);
    if (serie.length >= 2) {
      precedente += serie[serie.length - 2].prezzo * q;
      haPrecedente = true;
    } else {
      precedente += c.ultimoPrezzo * q; // nessun dato precedente: contribuisce 0 al delta
    }
  });
  return { attuale: attuale, precedente: precedente, haPrecedente: haPrecedente, conteggiate: conteggiate };
}

function disegnaSparkline(serie) {
  var W = 320, H = 90, PAD = 6;
  var valori = serie.map(function (r) { return r.prezzo; });
  var min = Math.min.apply(null, valori);
  var max = Math.max.apply(null, valori);
  var range = (max - min) || 1;

  var punti = valori.map(function (v, i) {
    var x = PAD + (i / Math.max(1, valori.length - 1)) * (W - 2 * PAD);
    var y = H - PAD - ((v - min) / range) * (H - 2 * PAD);
    return x.toFixed(1) + ',' + y.toFixed(1);
  });

  var linea = punti.join(' ');
  var area = PAD + ',' + (H - PAD) + ' ' + linea + ' ' + (W - PAD) + ',' + (H - PAD);

  return '<svg viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none">' +
    '<polygon points="' + area + '" fill="rgba(202,161,92,0.15)"/>' +
    '<polyline points="' + linea + '" fill="none" stroke="#caa15c" stroke-width="2" ' +
    'stroke-linejoin="round" stroke-linecap="round"/>' +
    '</svg>';
}

function render(dati) {
  var lista = document.getElementById('lista');
  var carte = dati.carte || [];
  var storico = dati.storico || [];

  document.getElementById('aggiornato').textContent =
    'ultimo controllo: ' + (dati.aggiornatoIl ? formattaData(dati.aggiornatoIl) : 'mai');

  if (carte.length === 0) {
    document.getElementById('vuoto').style.display = 'block';
    return;
  }

  var tot = calcolaTotale(carte, storico);
  if (tot.conteggiate > 0) {
    document.getElementById('totale').style.display = 'block';
    document.getElementById('totaleValore').textContent = euro(tot.attuale);
    var deltaEl = document.getElementById('totaleDelta');
    if (tot.haPrecedente) {
      var diff = tot.attuale - tot.precedente;
      if (Math.abs(diff) < 0.005) {
        deltaEl.textContent = 'invariato dal controllo precedente';
        deltaEl.className = 'delta pari';
      } else {
        deltaEl.textContent = (diff > 0 ? '▲ +' : '▼ −') + euro(Math.abs(diff)) + ' dal controllo precedente';
        deltaEl.className = 'delta ' + (diff > 0 ? 'su' : 'giu');
      }
    } else {
      deltaEl.textContent = 'primo controllo: nessun confronto disponibile';
      deltaEl.className = 'delta pari';
    }
  }

  carte.forEach(function (c, idx) {
    var riga = document.createElement('div');
    riga.className = 'riga';

    if (c.immagine) {
      var img = document.createElement('img');
      img.className = 'miniatura';
      img.src = c.immagine;
      img.alt = c.nome;
      img.loading = 'lazy';
      riga.appendChild(img);
    } else {
      var seg = document.createElement('div');
      seg.className = 'miniatura vuota';
      seg.textContent = '🂠';
      riga.appendChild(seg);
    }

    var info = document.createElement('div');
    info.className = 'info';

    var nome = document.createElement('div');
    nome.className = 'nome';
    nome.textContent = c.nome + (c.quantita && c.quantita > 1 ? ' ×' + c.quantita : '');
    info.appendChild(nome);

    if (c.filtroInfo) {
      var badge = document.createElement('div');
      badge.className = 'badge';
      badge.textContent = c.filtroInfo.toUpperCase();
      info.appendChild(badge);
    }

    var chip = document.createElement('div');

    if (c.ultimoPrezzo != null) {
      chip.className = 'prezzo-chip';
      chip.textContent = euro(c.ultimoPrezzo);
      var dett = document.createElement('div');
      dett.className = 'dettagli';
      var parti = [formattaData(c.ultimaData)];
      if (c.ultimaMedia3 != null) parti.push('med3 ' + euro(c.ultimaMedia3));
      if (c.ultimeOfferte != null) parti.push(c.ultimeOfferte + ' off. IT');
      dett.textContent = parti.join(' · ');
      info.appendChild(dett);
    } else if (c.ultimoBloccato) {
      riga.className += ' stato-bloccato';
      chip.className = 'prezzo-chip bloccato';
      chip.textContent = 'anti-bot';
    } else {
      riga.className += ' stato-vuoto';
      chip.className = 'prezzo-chip vuoto';
      chip.textContent = c.ultimoErrore ? 'errore' : '—';
    }

    riga.appendChild(info);
    riga.appendChild(chip);
    lista.appendChild(riga);

    // grafico andamento al tocco (se c'è abbastanza storico)
    var serie = serieCarta(storico, c);
    if (serie.length >= 2) {
      var box = document.createElement('div');
      box.className = 'grafico-box';
      box.innerHTML = disegnaSparkline(serie) +
        '<div class="grafico-legenda">' +
        '<span>' + formattaData(serie[0].data) + '</span>' +
        '<span>min ' + euro(Math.min.apply(null, serie.map(function (r) { return r.prezzo; }))) +
        ' · max ' + euro(Math.max.apply(null, serie.map(function (r) { return r.prezzo; }))) + '</span>' +
        '<span>' + formattaData(serie[serie.length - 1].data) + '</span>' +
        '</div>';
      lista.appendChild(box);

      riga.addEventListener('click', function () {
        box.classList.toggle('aperto');
      });
    }
  });
}
</script>
</body>
</html>
